<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
    integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css?family=Merriweather" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.3.1.js"></script>
<style>
    div {
        font-family: 'Merriweather', serif;
    }
</style>

<form name="myform" action="" method="POST">
    <div class='h5 ml-4 mt-4'>
        Dr Oliva's research papers sorted by
        <select class='ml-2' name="sortorder" onChange="javascript:update(this.selectedIndex)">
            <option value="chrono">chronological order</option>
            <option value="year">publication year</option>
            <option value="author">group of authors</option>
            <option value="topic">topic</option>
        </select>
    </div>
</form>

<div class='ml-2' id='pubs'>

</div>

<script type="text/javascript">

    function xmlFct(xml) {
        $papers = $(xml).find('paper').get().reverse();
        $s = "<ul id='publist'>";
        $($papers).each(
            function (i) {
                $s += "<li><p>";
                $s += "<b>" + $(this).find("title").text() + "</b>";
                $s += "<br>";
                $s += $(this).find("authors").text();
                $s += "<br>";
                $s += "[<a href=\"" + $(this).find("file_name").text() + "\">pdf</a>] ";
                $s += "<i>" + $(this).find("published").text() + "</i>, " + $(this).find("year").text();
                $s += "<br>"
                // if it has extra material, add it
                if ($(this).find("extra").length > 0) {
                    $s += $(this).find("extra").html();
                    $s += "<br>";
                }
                $s += "<b>Topic</b>: " + $(this).find("topic").text();
                $s += "</p></li>";
            }
        );
        $s += "</ul>";

        $('#pubs').append($s);
    }

    function xmlFctByChrono(xml) {
        $papers = $(xml).find('paper').get().reverse();
        $s = "<ul id='publist'>";
        $($papers).each(
            function (i) {
                $s += "<li><p>";
                $s += "<b>" + $(this).find("title").text() + "</b>";
                $s += "<br>";
                $s += $(this).find("authors").text();
                $s += "<br>";
                $s += "[<a target='_blank' href=\"" + $(this).find("file_name").text() + "\">pdf</a>] ";
                $s += "<i>" + $(this).find("published").text() + "</i>, " + $(this).find("year").text();
                $s += "<br>"
                $s += "<b>Topic</b>: " + $(this).find("topic").text();
                $s += "</p></li>";
            }
        );
        $s += "</ul>";

        $publist = document.getElementById("publist");
        $publist.parentNode.removeChild($publist);

        $('#pubs').append($s);
    }

    function xmlFctByYear(xml) {
        $papers = $(xml).find('paper').get().reverse();
        $papers.sort(function (a, b) {
            return $(a).find("year").text() > $(b).find("year").text() ? -1 : 1;
        }
        );
        $current_year = "";

        $s = "<section id='publist'><ul>";
        $($papers).each(
            function (i) {
                $new_year = $(this).find("year").text();
                if ($current_year != $new_year) {
                    $s += "</ul><div class='h5 ml-3'>" + $new_year + "</div><ul>";
                    $current_year = $new_year;
                }

                $s += "<li><p>";
                $s += "<b>" + $(this).find("title").text() + "</b>";
                $s += "<br>";
                $s += $(this).find("authors").text();
                $s += "<br>";
                $s += "[<a target='_blank' href=\"" + $(this).find("file_name").text() + "\">pdf</a>] ";
                $s += "<i>" + $(this).find("published").text() + "</i>"; // + $(this).find("year").text();
                $s += "<br>"
                $s += "<b>Topic</b>: " + $(this).find("topic").text();
                $s += "</p></li>";
            }
        );
        $s += "</ul></section>";

        $publist = document.getElementById("publist");
        $publist.parentNode.removeChild($publist);

        $('#pubs').append($s);
    }

    function xmlFctByAuthor(xml) {
        $papers = $(xml).find('paper').get();
        $papers.sort(function (a, b) {
            return $(a).find("authors").text() > $(b).find("authors").text() ? 1 : -1;
        }
        );
        $current_authors = "";

        $s = "<section id='publist'> <ul>";
        $($papers).each(
            function (i) {
                $new_authors = $(this).find("authors").text();
                if ($current_authors != $new_authors) {
                    $s += "</ul><div class='h5 ml-3'>" + $new_authors + "</div><ul>";
                    $current_authors = $new_authors;
                }

                $s += "<li><p>";
                $s += "<b>" + $(this).find("title").text() + "</b>";
                $s += "<br>";
                // $s += $(this).find("authors").text();
                // $s += "<br>";
                $s += "[<a target='_blank' href=\"" + $(this).find("file_name").text() + "\">pdf</a>] ";
                $s += "<i>" + $(this).find("published").text() + "</i>, " + $(this).find("year").text();
                $s += "<br>"
                $s += "<b>Topic</b>: " + $(this).find("topic").text();
                $s += "</p></li>";
            }
        );
        $s += "</ul></section>";

        $publist = document.getElementById("publist");
        $publist.parentNode.removeChild($publist);

        $('#pubs').append($s);
    }

    function xmlFctByTopic(xml) {
        $papers = $(xml).find('paper').get();
        $papers.sort(function (a, b) {
            return $(a).find("topic").text() > $(b).find("topic").text() ? 1 : -1;
        }
        );

        $current_topic = "";

        $s = "<section id='publist'> <ul>";
        $($papers).each(
            function (i) {
                $new_topic = $(this).find("topic").text();
                if ($current_topic != $new_topic) {
                    $s += "</ul><div class='h5 ml-3'>" + $new_topic + "</div> <ul>";
                    $current_topic = $new_topic;
                }
                $s += "<li><p>";
                $s += "<b>" + $(this).find("title").text() + "</b>";
                $s += "<br>";
                $s += $(this).find("authors").text();
                $s += "<br>";
                $s += "[<a target='_blank' href=\"" + $(this).find("file_name").text() + "\">pdf</a>] ";
                $s += "<i>" + $(this).find("published").text() + "</i>, " + $(this).find("year").text();
                $s += "<p></li>";
            }
        );
        $s += "</ul></section>";

        $publist = document.getElementById("publist");
        $publist.parentNode.removeChild($publist);

        $('#pubs').append($s);
    }

    function loadXMLFirst() {
        jQuery.get("/papers/publications.xml", {}, xmlFct);
    }

    function loadXML() {
        var sortorder = document.forms["myform"].sortorder;

        switch (sortorder.value) {
            case "chrono":
                jQuery.get("/papers/publications.xml", {}, xmlFctByChrono);
                break;
            case "year":
                jQuery.get("/papers/publications.xml", {}, xmlFctByYear);
                break;
            case "author":
                jQuery.get("/papers/publications.xml", {}, xmlFctByAuthor);
                break;
            case "topic":
                jQuery.get("/papers/publications.xml", {}, xmlFctByTopic);
                break;
            default:
        }
    }

    function update(savedIndex) {
        jQuery(loadXML);
        document.forms["myform"].sortorder.options[savedIndex].selected = true;
    }

    jQuery(loadXMLFirst);

</script>
